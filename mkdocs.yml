site_name: wknet
site_description: 面向 Windows 内核驱动的纯内核态 HTTP/HTTPS 客户端库 · A pure kernel-mode HTTP/HTTPS client library for Windows kernel drivers
site_url: https://x500x.github.io/wknet/
repo_url: https://github.com/x500x/wknet
repo_name: x500x/wknet
docs_dir: docsite
copyright: wknet · MIT License

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/header-wiki.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/x500x/wknet
      name: GitHub 仓库
    - icon: fontawesome/solid/book
      link: https://github.com/x500x/wknet/wiki
      name: GitHub Wiki

theme:
  name: material
  language: zh
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            首页: Home
            开始使用: Get Started
            构建: Build
            第一个请求: First Request
            集成要点: Integration Notes
            Cookbook: Cookbook
            概念与行为: Concepts
            架构: Architecture
            会话与连接池: Session & Pool
            异步模型: Async Model
            TLS 与信任: TLS & Trust
            能力边界: Capability Matrix
            错误码与 FAQ: Errors & FAQ
            协议指南: Protocols
            HTTP/1.1: HTTP/1.1
            HTTP/2: HTTP/2
            HTTP/3 与 QUIC: HTTP/3 & QUIC
            WebSocket: WebSocket
            SSE: SSE
            编码与密码学: Encoding & Crypto
            API 参考: API Reference
            总览: Overview
            会话与配置: Session & Config
            请求与响应: Request & Response
            同步 HTTP: Sync HTTP
            异步 HTTP: Async HTTP
            证书与 TLS 选项: TLS Options
            Codec 与 Crypto: Codec & Crypto
            贡献与项目: Contribute
            构建与测试: Build & Test
            日志与诊断: Logging
            贡献指南: Contributing
            内部边界: Internals
            路线图: Roadmap

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 开始使用:
      - 构建: build.md
      - 第一个请求: first-request.md
      - 集成要点: integration-checklist.md
      - Cookbook: cookbook.md
  - 概念与行为:
      - 架构: architecture.md
      - 会话与连接池: session-and-pool.md
      - 异步模型: async-model.md
      - TLS 与信任: tls-and-trust.md
      - 能力边界: capability-matrix.md
      - 错误码与 FAQ: errors-and-faq.md
  - 协议指南:
      - HTTP/1.1: http1.md
      - HTTP/2: http2.md
      - HTTP/3 与 QUIC: http3-quic.md
      - WebSocket: websocket.md
      - SSE: sse.md
      - 编码与密码学: encoding-and-crypto.md
  - API 参考:
      - 总览: api/overview.md
      - 会话与配置: api/session-config.md
      - 请求与响应: api/request-response.md
      - 同步 HTTP: api/http-sync.md
      - 异步 HTTP: api/http-async.md
      - WebSocket: api/websocket.md
      - SSE: api/sse.md
      - 证书与 TLS 选项: api/tls-options.md
      - Codec 与 Crypto: api/codec-crypto.md
  - 贡献与项目:
      - 构建与测试: build-and-test.md
      - 日志与诊断: logging.md
      - 贡献指南: contributing.md
      - 内部边界: internals.md
      - 路线图: roadmap.md
