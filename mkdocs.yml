site_name: KernelHttp
site_description: 面向 Windows 内核驱动的纯内核态 HTTP/HTTPS 客户端库 · A pure kernel-mode HTTP/HTTPS client library for Windows kernel drivers
site_url: https://x500x.github.io/khttp/
repo_url: https://github.com/x500x/khttp
repo_name: x500x/khttp
docs_dir: docsite
copyright: KernelHttp · MIT License

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/header-wiki.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/x500x/khttp
      name: GitHub 仓库
    - icon: fontawesome/solid/book
      link: https://github.com/x500x/khttp/wiki
      name: GitHub Wiki

theme:
  name: material
  language: zh
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            首页: Home
            入门: Start
            快速开始: Getting Started
            构建与测试: Build & Test
            协议: Protocols
            能力边界: Capability Matrix
            架构: Architecture
            HTTP/2 与 HPACK: HTTP/2 & HPACK
            TLS 与证书: TLS & Certificates
            密码学: Cryptography
            高层 API: High-Level API
            底层 API: Low-Level API
            配置: Configuration
            客户端类: Client Classes
            传输层: Transport Layer
            NTSTATUS 错误码: NTSTATUS Errors
            机制: Mechanics
            连接池: Connection Pool
            异步模型: Async Model
            内存模型: Memory Model
            实战与项目: Guides
            Cookbook 样例: Cookbook
            常见问题: FAQ
            路线图: Roadmap
            术语表: Glossary
            贡献指南: Contributing

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 入门:
      - 快速开始: getting-started.md
      - 构建与测试: build-and-test.md
  - 协议:
      - 能力边界: capability-matrix.md
      - 架构: architecture.md
      - HTTP/1.1: http1.md
      - HTTP/2 与 HPACK: http2.md
      - WebSocket: websocket.md
      - TLS 与证书: tls-and-certificates.md
      - 密码学: cryptography.md
  - API:
      - 高层 API: high-level-api.md
      - 底层 API: low-level-api.md
      - 配置: configuration.md
      - 客户端类: client-classes.md
      - 传输层: transport-layer.md
      - NTSTATUS 错误码: ntstatus-reference.md
  - 机制:
      - 连接池: connection-pool.md
      - 异步模型: async-model.md
      - 内存模型: memory-model.md
  - 实战与项目:
      - Cookbook 样例: cookbook.md
      - 常见问题: faq.md
      - 路线图: roadmap.md
      - 术语表: glossary.md
      - 贡献指南: contributing.md
